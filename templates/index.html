<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dropout Predictor</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .card-header {
            background-color: #2c3e50;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 25px;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ced4da;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
        }
        .btn-predict {
            background-color: #3498db;
            color: white;
            font-weight: 600;
            padding: 14px 35px;
            border-radius: 50px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }
        .btn-predict:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
            color: white;
        }
        .section-title {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .result-box {
            margin-top: 40px;
            padding: 25px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        .high-risk {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ef9a9a;
            box-shadow: 0 4px 15px rgba(198, 40, 40, 0.1);
        }
        .low-risk {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 8px 0 0 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9 col-md-12">
                <div class="card mb-5">
                    <div class="card-header text-center">
                        <h2 class="mb-1 fw-bold">Student Success Predictor</h2>
                        <p class="mb-0 mt-2 text-white-50 fs-5">Identify students at risk of dropping out using Machine Learning.</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        
                        <!-- Error Alert -->
                        {% if error_text %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i><strong>Error:</strong> {{ error_text }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endif %}

                        <form action="/predict" method="post">
                            
                            <!-- ==============================================
                                 NUMERICAL FEATURES SECTION 
                            =============================================== -->
                            <h4 class="section-title">Academic & Personal Demographics</h4>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6 col-sm-12">
                                    <label for="Age" class="form-label">Age</label>
                                    <input type="number" step="any" class="form-control" id="Age" name="Age" required placeholder="e.g., 20">
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="Family_Income" class="form-label">Family Income ($)</label>
                                    <input type="number" step="any" class="form-control" id="Family_Income" name="Family_Income" required placeholder="e.g., 50000">
                                </div>
                                
                                <div class="col-md-6 col-sm-12">
                                    <label for="Study_Hours_per_Day" class="form-label">Study Hours per Day</label>
                                    <input type="number" step="any" class="form-control" id="Study_Hours_per_Day" name="Study_Hours_per_Day" required placeholder="e.g., 4.5">
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="Attendance_Rate" class="form-label">Attendance Rate (%)</label>
                                    <input type="number" step="any" class="form-control" id="Attendance_Rate" name="Attendance_Rate" required placeholder="e.g., 85.5">
                                </div>

                                <div class="col-md-6 col-sm-12">
                                    <label for="Assignment_Delay_Days" class="form-label">Avg. Assignment Delay (Days)</label>
                                    <input type="number" step="any" class="form-control" id="Assignment_Delay_Days" name="Assignment_Delay_Days" required placeholder="e.g., 2">
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="Travel_Time_Minutes" class="form-label">Travel Time (Minutes)</label>
                                    <input type="number" step="any" class="form-control" id="Travel_Time_Minutes" name="Travel_Time_Minutes" required placeholder="e.g., 45">
                                </div>

                                <div class="col-md-6 col-sm-12">
                                    <label for="Stress_Index" class="form-label">Stress Index (1-10)</label>
                                    <input type="number" step="any" class="form-control" id="Stress_Index" name="Stress_Index" required placeholder="e.g., 6.5">
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="GPA" class="form-label">Current GPA</label>
                                    <input type="number" step="any" class="form-control" id="GPA" name="GPA" required placeholder="e.g., 3.2">
                                </div>

                                <div class="col-md-6 col-sm-12">
                                    <label for="Semester_GPA" class="form-label">Last Semester GPA</label>
                                    <input type="number" step="any" class="form-control" id="Semester_GPA" name="Semester_GPA" required placeholder="e.g., 3.0">
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="CGPA" class="form-label">Cumulative GPA (CGPA)</label>
                                    <input type="number" step="any" class="form-control" id="CGPA" name="CGPA" required placeholder="e.g., 3.15">
                                </div>
                            </div>

                            <!-- ==============================================
                                 CATEGORICAL FEATURES SECTION 
                            =============================================== -->
                            <h4 class="section-title mt-5">Categorical Profiles</h4>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6 col-sm-12">
                                    <label for="Gender" class="form-label">Gender</label>
                                    <select class="form-select" id="Gender" name="Gender" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="Internet_Access" class="form-label">Reliable Internet Access</label>
                                    <select class="form-select" id="Internet_Access" name="Internet_Access" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="Yes">Yes</option>
                                        <option value="No">No</option>
                                    </select>
                                </div>

                                <div class="col-md-6 col-sm-12">
                                    <label for="Part_Time_Job" class="form-label">Has Part-Time Job</label>
                                    <select class="form-select" id="Part_Time_Job" name="Part_Time_Job" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="Yes">Yes</option>
                                        <option value="No">No</option>
                                    </select>
                                </div>
                                <div class="col-md-6 col-sm-12">
                                    <label for="Scholarship" class="form-label">Has Scholarship</label>
                                    <select class="form-select" id="Scholarship" name="Scholarship" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="Yes">Yes</option>
                                        <option value="No">No</option>
                                    </select>
                                </div>

                                <div class="col-md-4 col-sm-12">
                                    <label for="Semester" class="form-label">Current Semester</label>
                                    <select class="form-select" id="Semester" name="Semester" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                    </select>
                                </div>
                                <div class="col-md-4 col-sm-12">
                                    <label for="Department" class="form-label">Department</label>
                                    <select class="form-select" id="Department" name="Department" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="Computer Science">Computer Science</option>
                                        <option value="Engineering">Engineering</option>
                                        <option value="Business">Business</option>
                                        <option value="Arts">Arts</option>
                                        <option value="Science">Science</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-4 col-sm-12">
                                    <label for="Parental_Education" class="form-label">Parental Education</label>
                                    <select class="form-select" id="Parental_Education" name="Parental_Education" required>
                                        <option value="" disabled selected>Choose...</option>
                                        <option value="High School">High School</option>
                                        <option value="Bachelors">Bachelor's Degree</option>
                                        <option value="Masters">Master's Degree</option>
                                        <option value="PhD">PhD</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="text-center mt-5">
                                <button type="submit" class="btn btn-predict shadow">
                                    Evaluate Dropout Risk
                                </button>
                            </div>
                        </form>

                        <!-- Prediction Result Display -->
                        {% if prediction_text %}
                        <div class="result-box {% if 'High' in prediction_text %}high-risk{% else %}low-risk{% endif %}">
                            <h3 class="mb-2">Prediction Outcome</h3>
                            <p class="mb-0 fs-3">{{ prediction_text }}</p>
                        </div>
                        {% endif %}

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (Includes Popper for dropdowns/alerts) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
